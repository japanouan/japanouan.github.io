name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ] # มั่นใจว่าชื่อสาขาถูกต้องตามโปรเจกต์ของคุณนะครับ

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      # 1. บังคับใช้ Node.js v24 ตัวใหม่ล่าสุด
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      # 2. ติดตั้ง Package ต่างๆ ในโปรเจกต์
      - name: Install dependencies
        run: npm ci

      # 3. รันคำสั่ง Build ของ Astro (จะได้ไฟล์ในโฟลเดอร์ dist)
      - name: Build Astro project
        run: npm run build

      # 4. แพ็กไฟล์ที่ Build เสร็จแล้วเพื่อเตรียมนำไปปล่อยออนไลน์
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # โฟลเดอร์ปลายทางที่ Astro build ออกมา

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4